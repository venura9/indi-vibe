name: Deploy API to Azure Functions

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - '.github/workflows/deploy-api.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Push Cosmos settings to Function App
        run: |
          az functionapp config appsettings set \
            --name func-indie-artist-platform \
            --resource-group rg-indie-artist-platform \
            --settings \
              COSMOS_ENDPOINT=${{ secrets.COSMOS_ENDPOINT }} \
              COSMOS_KEY=${{ secrets.COSMOS_KEY }} \
              COSMOS_DB=${{ secrets.COSMOS_DB }} \
              COSMOS_CONTAINER=${{ secrets.COSMOS_CONTAINER }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: func-indie-artist-platform
          package: api
